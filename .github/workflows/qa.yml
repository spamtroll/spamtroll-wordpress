name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run tests
        run: vendor/bin/pest --colors=always

  qa:
    name: Quality (PHPStan + cs-fixer + peck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring
          coverage: none
          tools: composer:v2

      - name: Install aspell (for peck)
        run: sudo apt-get update && sudo apt-get install -y aspell aspell-en

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHP-CS-Fixer (dry-run)
        run: composer lint

      - name: PHPStan
        run: composer stan

      - name: Peck (spell check)
        run: composer peck
